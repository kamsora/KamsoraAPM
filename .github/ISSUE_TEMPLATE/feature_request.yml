name: Feature request
description: Propose a new feature or enhancement.
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain, not (yet) the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: Backwards-incompatible / requires an ADR
        - label: Affects the hot path (Agent or Collector ingestion) - performance impact must be measured
        - label: Affects the Protobuf wire format
