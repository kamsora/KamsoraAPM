name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore KamsoraAPM.sln

      - name: Build
        run: dotnet build KamsoraAPM.sln --configuration Release --no-restore -warnaserror

      - name: Test (unit)
        # Integration tests need Docker; they run only on Linux below.
        run: >
          dotnet test KamsoraAPM.sln
          --configuration Release
          --no-build
          --filter "FullyQualifiedName!~Integration&FullyQualifiedName!~Load"
          --collect:"XPlat Code Coverage"
          --results-directory artifacts/test-results
          --logger "trx;LogFileName=test.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test-results
          if-no-files-found: ignore

  integration-tests:
    name: integration-tests (linux + docker)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}

      - name: Restore + Build
        run: |
          dotnet restore KamsoraAPM.sln
          dotnet build KamsoraAPM.sln --configuration Release --no-restore -warnaserror

      - name: Run integration tests (Testcontainers)
        run: >
          dotnet test tests/KamsoraAPM.Integration.Tests/KamsoraAPM.Integration.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=integration.trx"
        env:
          # Testcontainers reuses containers across tests for speed.
          TESTCONTAINERS_REUSE_ENABLE: "true"

      - name: Upload integration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: tests/KamsoraAPM.Integration.Tests/TestResults
          if-no-files-found: ignore

  docker-compose-smoke:
    name: docker-compose-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose configs
        run: |
          # The full compose uses required (:?) variables, so every invocation
          # needs an env file — .env.example carries CI-safe dev defaults.
          docker compose -f deploy/docker/docker-compose.deps.yml config --quiet
          docker compose -f deploy/docker/docker-compose.yml --profile deps --env-file deploy/docker/.env.example config --quiet
          docker compose -f deploy/docker/docker-compose.yml --profile apps --env-file deploy/docker/.env.example config --quiet
      - name: Bring up deps + run schema migrations
        run: |
          docker compose -f deploy/docker/docker-compose.deps.yml up -d --wait
          # Verify Postgres tables and ClickHouse databases came up.
          docker exec kamsora-apm-postgres psql -U kamsora -d kamsora_apm -c "\dt" | grep -E "mastertenants|tblapm_alert_rules"
          docker exec kamsora-apm-clickhouse clickhouse-client --query "SHOW DATABASES" | grep kamsora_apm
      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker/docker-compose.deps.yml down -v
