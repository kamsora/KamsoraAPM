# Release pipeline - runs when a version tag is pushed:
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Produces:
#   * KamsoraAPM.Agent nupkg pushed to NuGet.org via Trusted Publishing
#     (OIDC, no stored API key). Version comes from the Agent csproj;
#     --skip-duplicate makes re-tagging safe. Requires a trusted-publisher
#     policy on nuget.org (owner: kamsora, repo: KamsoraAPM, workflow:
#     release.yml). See docs/deploy/ for setup.
#   * Collector / Dashboard.Api / Dashboard SPA images pushed to GHCR,
#     tagged with the release version and `latest`.
#   * A GitHub Release with auto-generated notes and the nupkg attached.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to GHCR

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.202

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore KamsoraAPM.sln

      - name: Build
        run: dotnet build KamsoraAPM.sln --configuration Release --no-restore -warnaserror

      - name: Test (unit)
        run: >
          dotnet test KamsoraAPM.sln
          --configuration Release
          --no-build
          --filter "FullyQualifiedName!~Integration&FullyQualifiedName!~Load"

      - name: Pack Agent NuGet
        # Deliberately NOT --no-build. The Agent bundles its Contracts
        # ProjectReference into the package, and `pack --no-build` invokes the
        # Build target on that referenced project, which fails NETSDK1085
        # ("NoBuild was set but the Build target was invoked"). Restore already
        # ran in the Restore step, so --no-restore keeps this fast; the Release
        # build above is up to date, so this is an incremental no-op that packs
        # the exact same binaries the test step exercised.
        run: >
          dotnet pack src/KamsoraAPM.Agent/KamsoraAPM.Agent.csproj
          --configuration Release
          --no-restore
          --output artifacts/nupkgs

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/nupkgs/*.nupkg

  publish-nuget:
    name: publish-nuget
    runs-on: ubuntu-latest
    needs: build-and-test
    # Human-approval gate: the publish only runs after a required reviewer
    # approves it. Configure reviewers in repo Settings > Environments > release.
    environment: release
    permissions:
      id-token: write   # mint the GitHub OIDC token for NuGet Trusted Publishing
      contents: read
    steps:
      - name: Download nupkg artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: nupkgs

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.202

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived
      # NuGet API key (valid ~1 hour). No long-lived secret is stored. Requires
      # a trusted-publisher policy on nuget.org for owner kamsora, repo
      # KamsoraAPM, workflow release.yml.
      - name: NuGet login (OIDC to short-lived API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: kamsora   # nuget.org profile username (not email)

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "nupkgs/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  docker-images:
    name: docker-images (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: kamsora-apm-collector
            dockerfile: deploy/docker/Dockerfile.collector
          - name: kamsora-apm-dashboard-api
            dockerfile: deploy/docker/Dockerfile.dashboard-api
          - name: kamsora-apm-dashboard
            dockerfile: deploy/docker/Dockerfile.dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  publish-hostmonitor-windows:
    name: publish-hostmonitor (win-x64)
    runs-on: windows-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.202

      # Self-contained single-file: the target Windows server needs no .NET
      # runtime. No trimming - the config binder relies on reflection.
      # DebugType=none + GenerateDocumentationFile=false keep the bundle to just
      # the .exe, appsettings.json, and the one native shim.
      - name: Publish self-contained win-x64
        shell: pwsh
        run: >
          dotnet publish src/KamsoraAPM.HostMonitor/KamsoraAPM.HostMonitor.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=none
          -p:GenerateDocumentationFile=false
          -o staging/hostmonitor

      - name: Bundle install scripts + readme
        shell: pwsh
        run: |
          Copy-Item deploy/windows-service/install-service.ps1   staging/hostmonitor/
          Copy-Item deploy/windows-service/uninstall-service.ps1 staging/hostmonitor/
          Copy-Item deploy/windows-service/README.md             staging/hostmonitor/

      - name: Zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/hostmonitor | Out-Null
          Compress-Archive -Path staging/hostmonitor/* -DestinationPath artifacts/hostmonitor/kamsora-apm-hostmonitor-win-x64.zip -Force

      - name: Upload HostMonitor artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostmonitor-win-x64
          path: artifacts/hostmonitor/*.zip

  publish-hostmonitor-linux:
    name: publish-hostmonitor (linux-x64)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.202

      # Self-contained single-file: the target server needs no .NET runtime.
      # No trimming - the config binder relies on reflection.
      - name: Publish self-contained linux-x64
        run: >
          dotnet publish src/KamsoraAPM.HostMonitor/KamsoraAPM.HostMonitor.csproj
          -c Release
          -r linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=none
          -p:GenerateDocumentationFile=false
          -o staging/kamsora-apm-hostmonitor-linux-x64

      - name: Bundle systemd unit + scripts + readme
        run: |
          d=staging/kamsora-apm-hostmonitor-linux-x64
          cp deploy/systemd/kamsora-host-monitor.service "$d/"
          cp deploy/systemd/install-service.sh           "$d/"
          cp deploy/systemd/uninstall-service.sh         "$d/"
          cp deploy/systemd/README.md                    "$d/"
          chmod +x "$d/install-service.sh" "$d/uninstall-service.sh" "$d/KamsoraAPM.HostMonitor"

      - name: Tar
        run: |
          mkdir -p artifacts/hostmonitor
          tar -C staging -czf artifacts/hostmonitor/kamsora-apm-hostmonitor-linux-x64.tar.gz kamsora-apm-hostmonitor-linux-x64

      - name: Upload HostMonitor artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostmonitor-linux-x64
          path: artifacts/hostmonitor/*.tar.gz

  github-release:
    name: github-release
    runs-on: ubuntu-latest
    needs: [publish-nuget, docker-images, publish-hostmonitor-windows, publish-hostmonitor-linux]
    steps:
      - name: Download nupkg artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: nupkgs

      - name: Download HostMonitor (Windows) artifact
        uses: actions/download-artifact@v4
        with:
          name: hostmonitor-win-x64
          path: hostmonitor

      - name: Download HostMonitor (Linux) artifact
        uses: actions/download-artifact@v4
        with:
          name: hostmonitor-linux-x64
          path: hostmonitor

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            nupkgs/*.nupkg
            hostmonitor/*.zip
            hostmonitor/*.tar.gz
