# nginx config for serving the KamsoraAPM SPA.
#
# Two deployment shapes share this file:
#   * quickstart (deploy/docker): the SPA container is the front door on :3000,
#     so the /api/ block below proxies to Dashboard.Api directly.
#   * production (deploy/production): Caddy fronts everything and routes /api/*
#     to Dashboard.Api itself, so the /api/ block here is simply never hit.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # REST + SignalR backend. The compose service name is `dashboard-api` in
    # both stacks. Upgrade headers keep SignalR websockets working.
    location /api/ {
        proxy_pass http://dashboard-api:5090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }

    # Long-cache hashed assets (Vite emits content-hashed filenames).
    location /assets/ {
        access_log off;
        expires 365d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache the HTML shell - every deploy changes the asset hashes inside it.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback: anything not matching a file goes to index.html so client-side
    # routes like /traces/abc, /hosts, /platform resolve correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip text payloads (Caddy may already do this but doubling up is harmless).
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
