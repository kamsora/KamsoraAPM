//
// Metrics wire format. Mirrors a curated subset of OTLP metrics.proto
// (Gauge, Sum, Histogram). Exponential histograms and summaries are
// deferred to M2/M5 - see ADR-0004.
syntax = "proto3";

package kamsora.metrics.v1;

option csharp_namespace = "KamsoraAPM.Contracts.Metrics.V1";
option go_package        = "github.com/kamsora/kamsora-apm/contracts/metrics/v1;metricsv1";

import "kamsora/common/v1/common.proto";

message ResourceMetrics {
  kamsora.common.v1.Resource resource      = 1;
  repeated ScopeMetrics      scope_metrics = 2;
  string                     schema_url    = 3;
}

message ScopeMetrics {
  kamsora.common.v1.InstrumentationScope scope      = 1;
  repeated Metric                         metrics    = 2;
  string                                  schema_url = 3;
}

message Metric {
  string name        = 1;
  string description = 2;
  string unit        = 3;

  oneof data {
    Gauge      gauge     = 5;
    Sum        sum       = 7;
    Histogram  histogram = 9;
  }
}

enum AggregationTemporality {
  AGGREGATION_TEMPORALITY_UNSPECIFIED = 0;
  AGGREGATION_TEMPORALITY_DELTA       = 1;
  AGGREGATION_TEMPORALITY_CUMULATIVE  = 2;
}

message Gauge {
  repeated NumberDataPoint data_points = 1;
}

message Sum {
  repeated NumberDataPoint   data_points              = 1;
  AggregationTemporality     aggregation_temporality  = 2;
  bool                       is_monotonic             = 3;
}

message Histogram {
  repeated HistogramDataPoint data_points              = 1;
  AggregationTemporality      aggregation_temporality  = 2;
}

message NumberDataPoint {
  repeated kamsora.common.v1.KeyValue attributes               = 7;
  fixed64                             start_time_unix_nano     = 2;
  fixed64                             time_unix_nano           = 3;

  oneof value {
    double  as_double = 4;
    sfixed64 as_int   = 6;
  }

  uint32 flags = 8;
}

message HistogramDataPoint {
  repeated kamsora.common.v1.KeyValue attributes               = 9;
  fixed64                             start_time_unix_nano     = 2;
  fixed64                             time_unix_nano           = 3;
  fixed64                             count                    = 4;

  optional double                     sum                      = 5;
  optional double                     min                      = 11;
  optional double                     max                      = 12;

  repeated fixed64                    bucket_counts            = 6;
  repeated double                     explicit_bounds          = 7;

  uint32                              flags                    = 10;
}
